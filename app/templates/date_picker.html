{% extends "base.html" %}

{% set active_page = 'date' %}

{% block content %}
    <div class="mb-4">
        <h1 class="display-6">Select a Date</h1>
        <p class="text-muted">Choose a date to view the rotation schedule for that day.</p>
    </div>

    <div class="row">
        <div class="col-md-6 col-lg-4">
            <form method="GET" action="/date/">
                <div class="mb-3">
                    <label class="form-label" for="date">Date</label>
                    <input class="form-control" id="date" name="date" type="date" required>
                </div>
                <button class="btn btn-primary" type="submit">View Schedule</button>
            </form>
        </div>
    </div>
{% endblock %}
