{% extends "base.html" %}

{% set active_page = 'resident' %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
    <div class="mb-4">
        <h1 class="display-6">View by Resident</h1>
        <p class="text-muted">Search for a resident to view their full rotation schedule.</p>
    </div>

    <div class="row">
        <div class="col-md-8 col-lg-6">
            <label class="form-label" for="resident-select">Select a Resident</label>
            <select id="resident-select" placeholder="Type a name to search...">
                <option value="">Type a name to search...</option>
                {% for pgy_num in range(1, 6) %}
                {% set pgy_key = 'pgy' ~ pgy_num %}
                {% if names[pgy_key] %}
                <optgroup label="PGY {{ pgy_num }}">
                    {% for entry in names[pgy_key] %}
                    <option value="{{ entry.id }}">{{ entry.name }}{% if entry.visiting_institution %} ({{ entry.visiting_institution }}){% endif %}</option>
                    {% endfor %}
                </optgroup>
                {% endif %}
                {% endfor %}
            </select>
        </div>
    </div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/js/tom-select.complete.min.js"></script>
<script>
    new TomSelect('#resident-select', {
        render: {
            optgroup_header: function(data, escape) {
                return '<div class="optgroup-header fw-bold">' + escape(data.label) + '</div>';
            }
        },
        onChange: function(value) {
            if (value) {
                window.location.href = '/resident/?id=' + encodeURIComponent(value);
            }
        }
    });
</script>
{% endblock %}
