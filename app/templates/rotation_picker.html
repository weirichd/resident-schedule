{% extends "base.html" %}

{% set active_page = 'rotation' %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
    <div class="mb-4">
        <h1 class="display-6">View by Rotation</h1>
        <p class="text-muted">Search for a rotation to view all residents assigned to it.</p>
    </div>

    <div class="row">
        <div class="col-md-8 col-lg-6">
            <label class="form-label" for="rotation-select">Select a Rotation</label>
            <select id="rotation-select" placeholder="Type to search...">
                <option value="">Type to search...</option>
                {% for rot in rotations %}
                <option value="{{ rot.rotation }}">{{ rot.rotation }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/js/tom-select.complete.min.js"></script>
<script>
    new TomSelect('#rotation-select', {
        onChange: function(value) {
            if (value) {
                window.location.href = '/rotation/?rotation=' + encodeURIComponent(value);
            }
        }
    });
</script>
{% endblock %}
