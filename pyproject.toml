[tool.poetry]
name = "resident-schedule"
version = "1.0.0"
description = "OUS Resident schedule web app"
authors = ["David E. Weirich <weirich.david@gmail.com>"]

[tool.poetry.dependencies]
python = "^3.9"
Flask = "^2.1.3"
pandas = "^1.4.3"
xlrd = "^2.0.1"
